name: Deploy to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inject send config
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          VK_TOKEN: ${{ secrets.VK_TOKEN }}
          VK_USER_ID: ${{ secrets.VK_USER_ID }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
        run: |
          python3 - <<'PY'
          import os
          cfg = (
              "<?php\n"
              "define('TG_TOKEN',   '{tg_token}');\n"
              "define('TG_CHAT_ID', '{tg_chat}');\n"
              "define('VK_TOKEN',   '{vk_token}');\n"
              "define('VK_USER_ID', '{vk_user}');\n"
              "define('MAIL_TO',    '{mail_to}');\n"
              "define('MAIL_FROM',  '{mail_from}');\n"
              "define('MAIL_PASS',  '{mail_pass}');\n"
              "define('MAIL_HOST',  '{mail_host}');\n"
          ).format(
              tg_token=os.environ['TG_TOKEN'],
              tg_chat=os.environ['TG_CHAT_ID'],
              vk_token=os.environ['VK_TOKEN'],
              vk_user=os.environ['VK_USER_ID'],
              mail_to=os.environ['MAIL_TO'],
              mail_from=os.environ['MAIL_FROM'],
              mail_pass=os.environ['MAIL_PASS'],
              mail_host=os.environ['MAIL_HOST'],
          )
          with open('dist/send-config.php', 'w') as f:
              f.write(cfg)
          PY

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dist/
          target: ~/public_html/
          strip_components: 1
          rm: true
