name: Deploy to Timeweb

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inject send config
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          python3 - <<'PY'
          import os
          cfg = "<?php\ndefine('TG_TOKEN', '{token}');\ndefine('TG_CHAT_ID', '{chat}');\ndefine('MAIL_TO', '{mail}');\n".format(
              token=os.environ['TG_TOKEN'],
              chat=os.environ['TG_CHAT_ID'],
              mail=os.environ['MAIL_TO'],
          )
          with open('dist/send-config.php', 'w') as f:
              f.write(cfg)
          PY

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: dist/
          target: ~/public_html/
          strip_components: 1
          rm: true
